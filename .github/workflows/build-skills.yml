name: Build & Publish Skills Index

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      mode:
        description: "Build mode — incremental (only providers changed in this commit) or rebuild (every provider)."
        type: choice
        options:
          - incremental
          - rebuild
        default: incremental

env:
  PAY_IMAGE: us-central1-docker.pkg.dev/gateway-402/agent-gateway/pay:latest

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v5
        with:
          # Need at least one parent commit so we can diff what this merge
          # actually changed (the Solana-compat re-gate + --only computation).
          fetch-depth: 2

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/123883807128/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: pay-skills-ci@gateway-402.iam.gserviceaccount.com

      - run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      # Resolve the run mode. Default to `incremental` for ordinary push events;
      # respect the workflow_dispatch input when manually dispatched. A full
      # `rebuild` re-resolves and re-probes every provider — use it when the
      # `pay` image, the build pipeline, or the prune logic changed in a way
      # that affects already-cached providers.
      - name: Resolve build mode
        id: mode
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ -z "$MODE" ]; then MODE="incremental"; fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "Run mode: $MODE"

      # Detect provider directories whose contents changed in this merge. We
      # consider any file under `providers/` (not just PAY.md): a change to a
      # sidecar like `openapi.json` or `schemas/req.json` must rebuild the
      # owning provider's dist entry. For each changed file we walk up to the
      # nearest ancestor directory holding a PAY.md and emit that PAY.md.
      - name: Detect providers changed in this commit
        id: changed
        run: |
          ALL=$(git diff --name-only --diff-filter=ACMR HEAD~1...HEAD -- 'providers/**')
          PAY_FILES=""
          for f in $ALL; do
            dir="$f"
            while [ -n "$dir" ] && [ "$dir" != "providers" ] && [ "$dir" != "." ] && [ ! -f "$dir/PAY.md" ]; do
              dir=$(dirname "$dir")
            done
            if [ -f "$dir/PAY.md" ]; then
              PAY_FILES="$PAY_FILES $dir/PAY.md"
            fi
          done
          UNIQ=$(echo $PAY_FILES | tr ' ' '\n' | sort -u | tr '\n' ' ' | sed 's/[[:space:]]*$//')
          echo "files=$UNIQ" >> "$GITHUB_OUTPUT"
          if [ -z "$UNIQ" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No provider changes in this merge."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Changed providers in this merge:"
            for f in $UNIQ; do echo "  $f"; done
          fi

      # Re-run the Solana-compat gate against this merge's changes so a
      # bypassed PR can't silently publish a broken provider.
      # `--changed-from HEAD~1` performs the same diff + walk-up internally
      # as the step above, then runs probe + verdict on the resolved
      # provider set.
      - name: Solana-compat validation (gate)
        if: steps.changed.outputs.skip == 'false'
        run: |
          docker run --rm \
            -u "$(id -u):$(id -g)" \
            -v "$PWD:/repo" \
            -w /repo \
            $PAY_IMAGE \
            catalog check . \
              --changed-from HEAD~1 \
              --currencies USDC,USDT \
              --probe-timeout 15 \
              --probe-concurrency 5 \
              --format github

      # Pull the previously-published dist so we can copy unchanged
      # providers through. Skipped in `rebuild` mode since we want a fresh
      # full build.
      - name: Fetch previous dist (incremental mode only)
        id: prev
        if: steps.mode.outputs.mode == 'incremental'
        continue-on-error: true
        run: |
          mkdir -p prev-dist
          if gcloud storage rsync gs://pay-skills/v1/ prev-dist/ --recursive 2>/dev/null \
             && [ -f prev-dist/skills.json ]; then
            echo "have_prev=true" >> "$GITHUB_OUTPUT"
            echo "Pulled prior dist from gs://pay-skills/v1/"
          else
            echo "have_prev=false" >> "$GITHUB_OUTPUT"
            echo "No prior dist available — incremental falls back to a full rebuild"
          fi

      - name: Compute --only FQNs for partial rebuild
        id: only
        if: steps.mode.outputs.mode == 'incremental' && steps.prev.outputs.have_prev == 'true' && steps.changed.outputs.skip == 'false'
        run: |
          # Translate "providers/<fqn>/PAY.md" → "<fqn>", comma-joined.
          ONLY=$(echo "${{ steps.changed.outputs.files }}" | tr ' ' '\n' | \
            sed -E 's|^providers/(.+)/PAY\.md$|\1|' | grep -v '^$' | paste -sd, -)
          echo "fqns=$ONLY" >> "$GITHUB_OUTPUT"
          echo "Partial rebuild scope: $ONLY"

      # Probe-driven build: each endpoint's pricing / protocol[] /
      # supported_usd is reconstructed from the live 402 challenge.
      #
      # - `incremental` (default): only the providers changed in this commit
      #   are re-probed; everyone else is copied verbatim from the prior
      #   dist. Fast (seconds per provider) and idempotent.
      # - `rebuild` (manual): full re-resolve + re-probe of every provider.
      #   Use after image changes that affect cached providers (new prune
      #   logic, new Discovery support, etc.) — it's slower (~5-15 min) but
      #   guarantees the published index reflects the latest pipeline.
      - name: Build dist/ (probe-driven)
        run: |
          PARTIAL_ARGS=""
          if [ "${{ steps.mode.outputs.mode }}" = "incremental" ] \
             && [ "${{ steps.prev.outputs.have_prev }}" = "true" ] \
             && [ "${{ steps.changed.outputs.skip }}" = "false" ] \
             && [ -n "${{ steps.only.outputs.fqns }}" ]; then
            PARTIAL_ARGS="--only ${{ steps.only.outputs.fqns }} --previous-dist /repo/prev-dist"
            echo "Mode: incremental (--only ${{ steps.only.outputs.fqns }})"
          else
            echo "Mode: full rebuild (every provider re-resolved + re-probed)"
          fi
          docker run --rm \
            -u "$(id -u):$(id -g)" \
            -v "$PWD:/repo" \
            -w /repo \
            $PAY_IMAGE \
            catalog build . \
              --base-url https://storage.googleapis.com/pay-skills/v1 \
              --probe-timeout 15 \
              --probe-concurrency 5 \
              $PARTIAL_ARGS

      - name: Show summary
        run: |
          echo "=== skills.json ==="
          python3 -m json.tool dist/skills.json | head -20
          echo "..."
          echo "=== detail files ==="
          find dist/providers -name '*.json' | sort
          echo ""
          echo "=== status counts (per probe_status) ==="
          python3 -c "
          import json, glob
          counts = {}
          for f in sorted(glob.glob('dist/providers/**/*.json', recursive=True)):
              d = json.load(open(f))
              for e in d.get('endpoints', []):
                  s = e.get('probe_status', 'unknown')
                  counts[s] = counts.get(s, 0) + 1
          for s, c in sorted(counts.items(), key=lambda kv: -kv[1]):
              print(f'  {s:30s} {c}')
          "

      - name: Upload dist/ as artifact
        uses: actions/upload-artifact@v4
        with:
          name: skills-dist
          path: dist/

      - name: Publish to GCS
        run: |
          gcloud storage rsync dist/ gs://pay-skills/v1/ \
            --recursive \
            --cache-control="public, max-age=300" \
            --checksums-only
          gcloud storage cp dist/skills.json gs://pay-skills/v1/skills.json \
            --cache-control="public, max-age=60"
