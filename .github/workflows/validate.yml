name: Validate

on:
  pull_request:
    branches: [main]

env:
  PAY_IMAGE: us-central1-docker.pkg.dev/gateway-402/agent-gateway/pay:latest

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # Static check across the entire registry: every PAY.md is parsed,
      # frontmatter is shape-validated (category / required fields / lengths),
      # OpenAPI is resolved (URL fetch or relative-path read). No live probe —
      # that lives in the next step. Catches regressions in unchanged
      # providers (e.g. a renamed category enum).
      - name: Static check (entire registry)
        run: |
          docker run --rm \
            -u "$(id -u):$(id -g)" \
            -v "$PWD:/repo" \
            -w /repo \
            $PAY_IMAGE \
            catalog check . --no-probe

      # Solana-compat gate on the diff: warns per gated endpoint that doesn't
      # accept USDC/USDT on Solana, errors (blocks) when a changed provider
      # has zero classifiable Solana-compatible endpoints. `--changed-from`
      # runs `git diff <ref>...HEAD` internally and resolves any changed file
      # under providers/ (PAY.md, openapi.json, schemas, …) to the PAY.md of
      # its containing provider. `--format github` emits ::warning:: /
      # ::error:: workflow-command lines so failures land inline on the PR.
      - name: Probe + Solana-compat gate (changed providers)
        run: |
          docker run --rm \
            -u "$(id -u):$(id -g)" \
            -v "$PWD:/repo" \
            -w /repo \
            $PAY_IMAGE \
            catalog check . \
              --changed-from origin/${{ github.base_ref }} \
              --currencies USDC,USDT \
              --probe-timeout 15 \
              --probe-concurrency 5 \
              --format github

      # Step Summary block — re-run the verdict in JSON form and turn it into
      # a per-PR markdown table for human review. Always runs (`always()`)
      # even if the previous step failed, so reviewers see why.
      - name: Verdict summary
        if: always()
        run: |
          docker run --rm \
            -u "$(id -u):$(id -g)" \
            -v "$PWD:/repo" \
            -w /repo \
            $PAY_IMAGE \
            catalog check . \
              --changed-from origin/${{ github.base_ref }} \
              --currencies USDC,USDT \
              --probe-timeout 15 \
              --probe-concurrency 5 \
              --format json > validate.json 2>/dev/null || true

          {
            echo "### Solana-compatibility verdict"
            if [ -s validate.json ]; then
              python3 -c "
          import json
          r = json.load(open('validate.json'))
          blocks = sum(1 for p in r['providers'] if p['block'])
          warns = sum(p['non_solana_count'] for p in r['providers'])
          oks   = sum(p['ok_count'] for p in r['providers'])
          if blocks > 0:
              icon = ':no_entry:'
              status = f'**{blocks}** provider(s) blocked'
          elif warns > 0:
              icon = ':warning:'
              status = f'{warns} non-Solana endpoint(s) flagged'
          else:
              icon = ':white_check_mark:'
              status = f'{oks} Solana-compatible endpoint(s)'
          print(f'{icon} {status}')
          print()
          print('| Provider | OK | Non-Solana | Verdict |')
          print('|----------|----|------------|---------|')
          for p in r['providers']:
              v = ':no_entry: BLOCK' if p['block'] else (':warning: warn' if p['non_solana_count'] > 0 else ':white_check_mark: pass')
              print(f\"| \`{p['fqn']}\` | {p['ok_count']} | {p['non_solana_count']} | {v} |\")
          for p in r['providers']:
              if p['non_solana_count'] == 0:
                  continue
              print()
              print(f\"<details><summary>{p['fqn']} — non-Solana endpoints</summary>\")
              print()
              print('| Method | Path | Status | Note |')
              print('|--------|------|--------|------|')
              for e in p['endpoints']:
                  if e['verdict'] != 'not_solana':
                      continue
                  print(f\"| \`{e['method']}\` | \`{e['path']}\` | \`{e['probe_status']}\` | {e['note']} |\")
              print()
              print('</details>')
          "
            else
              echo ':information_source: No changed providers in this PR — verdict skipped.'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
